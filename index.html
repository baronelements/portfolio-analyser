<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Analyser — Bluerock Wealth</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.5.0/umd/Recharts.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; }
    .line-clamp-1 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const {
      PieChart, Pie, Cell, Tooltip, Legend, ResponsiveContainer,
      BarChart, Bar, XAxis, YAxis, CartesianGrid
    } = Recharts;

    const CATEGORY_COLORS = {
      "Australian Equities": "#1d4ed8",
      "International Equities": "#0891b2",
      "Fixed Income": "#059669",
    };
    const CATEGORY_BG = {
      "Australian Equities": "#eff6ff",
      "International Equities": "#ecfeff",
      "Fixed Income": "#ecfdf5",
    };
    const CATEGORY_BORDER = {
      "Australian Equities": "#bfdbfe",
      "International Equities": "#a5f3fc",
      "Fixed Income": "#a7f3d0",
    };

    const initialHoldings = [
      { id: 1,  ticker: "CBA",  name: "Commonwealth Bank of Australia",              category: "Australian Equities",    type: "Direct", value: 15000, units: 120,  mer: null },
      { id: 2,  ticker: "BHP",  name: "BHP Group Limited",                           category: "Australian Equities",    type: "Direct", value: 12000, units: 280,  mer: null },
      { id: 3,  ticker: "CSL",  name: "CSL Limited",                                 category: "Australian Equities",    type: "Direct", value: 10000, units: 35,   mer: null },
      { id: 4,  ticker: "NAB",  name: "National Australia Bank",                     category: "Australian Equities",    type: "Direct", value: 8500,  units: 225,  mer: null },
      { id: 5,  ticker: "WES",  name: "Wesfarmers Limited",                          category: "Australian Equities",    type: "Direct", value: 7500,  units: 100,  mer: null },
      { id: 6,  ticker: "WBC",  name: "Westpac Banking Corporation",                 category: "Australian Equities",    type: "Direct", value: 6000,  units: 250,  mer: null },
      { id: 7,  ticker: "VAS",  name: "Vanguard Australian Shares Index ETF",        category: "Australian Equities",    type: "ETF",    value: 20000, units: 250,  mer: 0.07 },
      { id: 8,  ticker: "VGS",  name: "Vanguard MSCI Index International Shares ETF", category: "International Equities", type: "ETF",  value: 30000, units: 240,  mer: 0.18 },
      { id: 9,  ticker: "IVV",  name: "iShares S&P 500 ETF",                        category: "International Equities", type: "ETF",    value: 20000, units: 175,  mer: 0.04 },
      { id: 10, ticker: "QUAL", name: "VanEck MSCI World ex Australia Quality ETF",  category: "International Equities", type: "ETF",    value: 15000, units: 230,  mer: 0.40 },
      { id: 11, ticker: "IAF",  name: "iShares Core Composite Bond ETF",             category: "Fixed Income",           type: "ETF",    value: 15000, units: 300,  mer: 0.15 },
      { id: 12, ticker: "VAF",  name: "Vanguard Australian Fixed Interest Index ETF", category: "Fixed Income",          type: "ETF",    value: 10000, units: 200,  mer: 0.20 },
      { id: 13, ticker: "CASH", name: "Cash / Term Deposits",                        category: "Fixed Income",           type: "Direct", value: 10000, units: null, mer: null },
    ];

    const CATEGORIES = ["Australian Equities", "International Equities", "Fixed Income"];
    const TYPES = ["Direct", "ETF"];

    const fmtAUD = (v) =>
      v == null ? "—" : new Intl.NumberFormat("en-AU", { style: "currency", currency: "AUD", maximumFractionDigits: 0 }).format(v);
    const fmtPct = (v, dp = 1) => v == null ? "—" : `${v.toFixed(dp)}%`;
    const categoryIcon = (cat) => {
      if (cat === "Australian Equities") return "🇦🇺";
      if (cat === "International Equities") return "🌏";
      return "🏦";
    };

    let nextId = 14;

    function Badge({ children, colour }) {
      const map = { ETF: "bg-violet-100 text-violet-700", Direct: "bg-slate-100 text-slate-600" };
      return (
        <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${map[colour] || "bg-gray-100 text-gray-600"}`}>
          {children}
        </span>
      );
    }

    function StatCard({ label, value, sub }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 flex flex-col gap-1">
          <p className="text-xs text-slate-500 font-medium uppercase tracking-wide">{label}</p>
          <p className="text-2xl font-bold text-slate-800">{value}</p>
          {sub && <p className="text-xs text-slate-400">{sub}</p>}
        </div>
      );
    }

    function EditModal({ holding, onSave, onClose }) {
      const [form, setForm] = useState({
        ticker:   holding?.ticker   ?? "",
        name:     holding?.name     ?? "",
        category: holding?.category ?? CATEGORIES[0],
        type:     holding?.type     ?? "ETF",
        value:    holding?.value    ?? "",
        units:    holding?.units    ?? "",
        mer:      holding?.mer      ?? "",
      });
      const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
      const handleSave = () => {
        if (!form.ticker || !form.name || !form.value) return;
        onSave({
          ...holding,
          ticker:   form.ticker.toUpperCase(),
          name:     form.name,
          category: form.category,
          type:     form.type,
          value:    parseFloat(form.value) || 0,
          units:    form.units !== "" ? parseFloat(form.units) : null,
          mer:      form.type === "ETF" && form.mer !== "" ? parseFloat(form.mer) : null,
        });
      };
      const inputCls = "w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400";
      const labelCls = "block text-xs font-semibold text-slate-500 mb-1";
      return (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">
            <div className="bg-gradient-to-r from-blue-600 to-cyan-500 px-6 py-4">
              <h3 className="text-white font-bold text-lg">{holding?.id ? "Edit Holding" : "Add Holding"}</h3>
            </div>
            <div className="p-6 grid grid-cols-2 gap-4">
              <div>
                <label className={labelCls}>Ticker *</label>
                <input className={inputCls} value={form.ticker} onChange={set("ticker")} placeholder="e.g. VGS" />
              </div>
              <div>
                <label className={labelCls}>Type</label>
                <select className={inputCls} value={form.type} onChange={set("type")}>
                  {TYPES.map((t) => <option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="col-span-2">
                <label className={labelCls}>Name *</label>
                <input className={inputCls} value={form.name} onChange={set("name")} placeholder="Full security name" />
              </div>
              <div className="col-span-2">
                <label className={labelCls}>Asset Class</label>
                <select className={inputCls} value={form.category} onChange={set("category")}>
                  {CATEGORIES.map((c) => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label className={labelCls}>Market Value (AUD) *</label>
                <input className={inputCls} type="number" min="0" value={form.value} onChange={set("value")} placeholder="0" />
              </div>
              <div>
                <label className={labelCls}>Units / Shares</label>
                <input className={inputCls} type="number" min="0" value={form.units} onChange={set("units")} placeholder="Optional" />
              </div>
              {form.type === "ETF" && (
                <div className="col-span-2">
                  <label className={labelCls}>MER (% p.a.)</label>
                  <input className={inputCls} type="number" step="0.01" min="0" value={form.mer} onChange={set("mer")} placeholder="e.g. 0.18" />
                </div>
              )}
            </div>
            <div className="flex gap-3 px-6 pb-6">
              <button onClick={onClose} className="flex-1 border border-slate-200 text-slate-600 rounded-lg py-2 text-sm font-semibold hover:bg-slate-50">Cancel</button>
              <button onClick={handleSave} className="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-blue-700">Save</button>
            </div>
          </div>
        </div>
      );
    }

    const CustomTooltip = ({ active, payload }) => {
      if (!active || !payload?.length) return null;
      const { name, value } = payload[0].payload;
      return (
        <div className="bg-white border border-slate-200 rounded-lg shadow-lg px-3 py-2 text-sm">
          <p className="font-semibold text-slate-700">{name}</p>
          <p className="text-slate-500">{fmtAUD(value)}</p>
        </div>
      );
    };

    function PortfolioAnalyser() {
      const [holdings, setHoldings]     = useState(initialHoldings);
      const [editTarget, setEditTarget] = useState(null);
      const [showAdd, setShowAdd]       = useState(false);
      const [filterCat, setFilterCat]   = useState("All");
      const [tab, setTab]               = useState("holdings");

      const total = useMemo(() => holdings.reduce((s, h) => s + (h.value || 0), 0), [holdings]);

      const byCategory = useMemo(() =>
        CATEGORIES.map((cat) => {
          const items  = holdings.filter((h) => h.category === cat);
          const catVal = items.reduce((s, h) => s + (h.value || 0), 0);
          const etfs   = items.filter((h) => h.type === "ETF" && h.mer != null);
          const etfVal = etfs.reduce((s, h) => s + h.value, 0);
          const wtdMer = etfVal > 0 ? etfs.reduce((s, h) => s + h.mer * h.value, 0) / etfVal : null;
          return { name: cat, value: catVal, alloc: total ? (catVal / total) * 100 : 0, wtdMer };
        }),
      [holdings, total]);

      const portfolioWtdMer = useMemo(() => {
        const etfs   = holdings.filter((h) => h.type === "ETF" && h.mer != null);
        const etfVal = etfs.reduce((s, h) => s + h.value, 0);
        return etfVal > 0 ? etfs.reduce((s, h) => s + h.mer * h.value, 0) / etfVal : null;
      }, [holdings]);

      const annualMerCost = useMemo(() =>
        holdings.filter((h) => h.type === "ETF" && h.mer != null)
                .reduce((s, h) => s + h.value * h.mer / 100, 0),
      [holdings]);

      const saveHolding = (updated) => {
        if (updated.id) setHoldings((hs) => hs.map((h) => h.id === updated.id ? updated : h));
        else setHoldings((hs) => [...hs, { ...updated, id: nextId++ }]);
        setEditTarget(null); setShowAdd(false);
      };
      const deleteHolding = (id) => setHoldings((hs) => hs.filter((h) => h.id !== id));
      const visible  = filterCat === "All" ? holdings : holdings.filter((h) => h.category === filterCat);
      const pieData  = byCategory.map((c) => ({ name: c.name, value: c.value }));

      return (
        <div className="min-h-screen bg-slate-50">
          {/* Header */}
          <div className="bg-gradient-to-r from-blue-700 via-blue-600 to-cyan-500 px-6 py-5 shadow-lg">
            <div className="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-3">
              <div>
                <h1 className="text-white text-2xl font-bold tracking-tight">Portfolio Analyser</h1>
                <p className="text-blue-100 text-sm mt-0.5">Bluerock Wealth — Asset Allocation &amp; MER Tracker</p>
              </div>
              <button onClick={() => setShowAdd(true)}
                className="bg-white text-blue-700 font-semibold text-sm px-4 py-2 rounded-xl shadow hover:bg-blue-50 transition">
                + Add Holding
              </button>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 py-6 space-y-6">
            {/* Stat cards */}
            <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))" }}>
              <StatCard label="Total Portfolio" value={fmtAUD(total)} sub={`${holdings.length} holdings`} />
              <StatCard label="Portfolio Wtd MER" value={portfolioWtdMer != null ? fmtPct(portfolioWtdMer, 2) : "—"} sub="ETF holdings only" />
              <StatCard label="Est. Annual MER Cost" value={fmtAUD(annualMerCost)} sub="Based on ETF MERs" />
              <StatCard label="Asset Classes" value="3" sub="AU Eq · Int Eq · FI" />
            </div>

            {/* Category cards */}
            <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))" }}>
              {byCategory.map((c) => (
                <div key={c.name} className="rounded-xl border p-4"
                  style={{ background: CATEGORY_BG[c.name], borderColor: CATEGORY_BORDER[c.name] }}>
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-lg">{categoryIcon(c.name)}</span>
                    <span className="text-sm font-bold text-slate-700">{c.name}</span>
                  </div>
                  <p className="text-xl font-bold" style={{ color: CATEGORY_COLORS[c.name] }}>{fmtAUD(c.value)}</p>
                  <div className="mt-2 space-y-1">
                    <div className="flex justify-between text-xs text-slate-500">
                      <span>Allocation</span>
                      <span className="font-semibold text-slate-700">{fmtPct(c.alloc)}</span>
                    </div>
                    {c.wtdMer != null && (
                      <div className="flex justify-between text-xs text-slate-500">
                        <span>Wtd MER (ETFs)</span>
                        <span className="font-semibold text-slate-700">{fmtPct(c.wtdMer, 2)}</span>
                      </div>
                    )}
                    <div className="mt-2 h-1.5 bg-white/60 rounded-full overflow-hidden">
                      <div className="h-full rounded-full" style={{ width: `${c.alloc}%`, background: CATEGORY_COLORS[c.name] }} />
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Tabs */}
            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="flex border-b border-slate-100">
                {["holdings", "allocation"].map((t) => (
                  <button key={t} onClick={() => setTab(t)}
                    className={`px-6 py-3 text-sm font-semibold capitalize transition ${
                      tab === t ? "text-blue-600 border-b-2 border-blue-600 bg-blue-50/60" : "text-slate-500 hover:text-slate-700"
                    }`}>
                    {t === "holdings" ? "Holdings" : "Allocation & Charts"}
                  </button>
                ))}
              </div>

              {tab === "holdings" && (
                <div>
                  <div className="flex gap-2 p-4 flex-wrap border-b border-slate-100">
                    {["All", ...CATEGORIES].map((c) => (
                      <button key={c} onClick={() => setFilterCat(c)}
                        className={`text-xs font-semibold px-3 py-1.5 rounded-full border transition ${
                          filterCat === c ? "bg-blue-600 text-white border-blue-600" : "bg-white text-slate-600 border-slate-200 hover:border-blue-300"
                        }`}>
                        {c === "All" ? "All Holdings" : `${categoryIcon(c)} ${c}`}
                      </button>
                    ))}
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
                          <th className="text-left px-4 py-3 font-semibold">Ticker</th>
                          <th className="text-left px-4 py-3 font-semibold">Name</th>
                          <th className="text-left px-4 py-3 font-semibold">Asset Class</th>
                          <th className="text-left px-4 py-3 font-semibold">Type</th>
                          <th className="text-right px-4 py-3 font-semibold">Units</th>
                          <th className="text-right px-4 py-3 font-semibold">Value (AUD)</th>
                          <th className="text-right px-4 py-3 font-semibold">Allocation</th>
                          <th className="text-right px-4 py-3 font-semibold">MER %</th>
                          <th className="text-right px-4 py-3 font-semibold">Annual MER $</th>
                          <th className="px-4 py-3"></th>
                        </tr>
                      </thead>
                      <tbody>
                        {visible.map((h, i) => {
                          const alloc   = total ? (h.value / total) * 100 : 0;
                          const annCost = h.mer != null ? h.value * h.mer / 100 : null;
                          return (
                            <tr key={h.id} className={`border-t border-slate-100 hover:bg-slate-50 transition ${i % 2 ? "bg-slate-50/30" : ""}`}>
                              <td className="px-4 py-3 font-bold text-slate-800">{h.ticker}</td>
                              <td className="px-4 py-3 text-slate-600 max-w-xs"><span className="line-clamp-1">{h.name}</span></td>
                              <td className="px-4 py-3">
                                <span className="text-xs font-medium" style={{ color: CATEGORY_COLORS[h.category] }}>
                                  {categoryIcon(h.category)} {h.category}
                                </span>
                              </td>
                              <td className="px-4 py-3"><Badge colour={h.type}>{h.type}</Badge></td>
                              <td className="px-4 py-3 text-right text-slate-500">{h.units != null ? h.units.toLocaleString() : "—"}</td>
                              <td className="px-4 py-3 text-right font-semibold text-slate-800">{fmtAUD(h.value)}</td>
                              <td className="px-4 py-3 text-right">
                                <div className="flex items-center justify-end gap-2">
                                  <div className="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full rounded-full bg-blue-500" style={{ width: `${Math.min(alloc * 3, 100)}%` }} />
                                  </div>
                                  <span className="text-xs font-semibold text-slate-600 w-10 text-right">{fmtPct(alloc)}</span>
                                </div>
                              </td>
                              <td className="px-4 py-3 text-right">
                                {h.mer != null
                                  ? <span className="text-xs font-semibold text-violet-600 bg-violet-50 px-2 py-0.5 rounded-full">{fmtPct(h.mer, 2)}</span>
                                  : <span className="text-slate-300 text-xs">—</span>}
                              </td>
                              <td className="px-4 py-3 text-right text-slate-500 text-xs">{annCost != null ? fmtAUD(annCost) : "—"}</td>
                              <td className="px-4 py-3 text-right">
                                <div className="flex gap-1 justify-end">
                                  <button onClick={() => setEditTarget(h)}
                                    className="text-xs text-blue-600 hover:text-blue-800 border border-blue-200 hover:bg-blue-50 px-2 py-1 rounded-lg transition">Edit</button>
                                  <button onClick={() => deleteHolding(h.id)}
                                    className="text-xs text-red-500 hover:text-red-700 border border-red-200 hover:bg-red-50 px-2 py-1 rounded-lg transition">✕</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                      <tfoot>
                        <tr className="border-t-2 border-slate-200 bg-slate-50 font-bold">
                          <td colSpan={5} className="px-4 py-3 text-slate-600 text-xs uppercase tracking-wide">Total</td>
                          <td className="px-4 py-3 text-right text-slate-800">{fmtAUD(total)}</td>
                          <td className="px-4 py-3 text-right text-slate-600 text-xs">100.0%</td>
                          <td className="px-4 py-3 text-right text-violet-600 text-xs">{portfolioWtdMer != null ? fmtPct(portfolioWtdMer, 2) : "—"}</td>
                          <td className="px-4 py-3 text-right text-slate-600 text-xs">{fmtAUD(annualMerCost)}</td>
                          <td />
                        </tr>
                      </tfoot>
                    </table>
                  </div>
                </div>
              )}

              {tab === "allocation" && (
                <div className="p-6 grid gap-8" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))" }}>
                  <div>
                    <h3 className="text-sm font-bold text-slate-600 uppercase tracking-wide mb-4">Asset Class Allocation</h3>
                    <ResponsiveContainer width="100%" height={280}>
                      <PieChart>
                        <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%"
                          innerRadius={60} outerRadius={110} paddingAngle={3}
                          label={({ percent }) => `${(percent * 100).toFixed(1)}%`} labelLine={false}>
                          {pieData.map((entry) => <Cell key={entry.name} fill={CATEGORY_COLORS[entry.name]} />)}
                        </Pie>
                        <Tooltip content={<CustomTooltip />} />
                        <Legend formatter={(value) => <span className="text-xs text-slate-600">{value}</span>} />
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                  <div>
                    <h3 className="text-sm font-bold text-slate-600 uppercase tracking-wide mb-4">Value by Asset Class</h3>
                    <ResponsiveContainer width="100%" height={280}>
                      <BarChart data={byCategory} margin={{ top: 5, right: 10, bottom: 40, left: 10 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
                        <XAxis dataKey="name" tick={{ fontSize: 10, fill: "#64748b" }} angle={-20} textAnchor="end" interval={0} />
                        <YAxis tickFormatter={(v) => `$${(v / 1000).toFixed(0)}k`} tick={{ fontSize: 10, fill: "#64748b" }} />
                        <Tooltip formatter={(v) => [fmtAUD(v), "Value"]} />
                        <Bar dataKey="value" radius={[6, 6, 0, 0]}>
                          {byCategory.map((c) => <Cell key={c.name} fill={CATEGORY_COLORS[c.name]} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="col-span-full">
                    <h3 className="text-sm font-bold text-slate-600 uppercase tracking-wide mb-4">MER Details — ETF Holdings</h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
                            <th className="text-left px-4 py-3">Ticker</th>
                            <th className="text-left px-4 py-3">Name</th>
                            <th className="text-left px-4 py-3">Asset Class</th>
                            <th className="text-right px-4 py-3">Value</th>
                            <th className="text-right px-4 py-3">Portfolio Weight</th>
                            <th className="text-right px-4 py-3">MER % p.a.</th>
                            <th className="text-right px-4 py-3">Annual MER Cost</th>
                            <th className="text-right px-4 py-3">MER Bar</th>
                          </tr>
                        </thead>
                        <tbody>
                          {holdings.filter((h) => h.type === "ETF" && h.mer != null).map((h) => {
                            const maxMer = Math.max(...holdings.filter((x) => x.mer != null).map((x) => x.mer));
                            return (
                              <tr key={h.id} className="border-t border-slate-100 hover:bg-slate-50">
                                <td className="px-4 py-3 font-bold text-slate-800">{h.ticker}</td>
                                <td className="px-4 py-3 text-slate-600">{h.name}</td>
                                <td className="px-4 py-3 text-xs" style={{ color: CATEGORY_COLORS[h.category] }}>{categoryIcon(h.category)} {h.category}</td>
                                <td className="px-4 py-3 text-right text-slate-700">{fmtAUD(h.value)}</td>
                                <td className="px-4 py-3 text-right text-slate-500 text-xs">{total ? fmtPct((h.value / total) * 100) : "—"}</td>
                                <td className="px-4 py-3 text-right"><span className="font-semibold text-violet-700">{fmtPct(h.mer, 2)}</span></td>
                                <td className="px-4 py-3 text-right text-slate-600">{fmtAUD(h.value * h.mer / 100)}</td>
                                <td className="px-4 py-3 text-right">
                                  <div className="w-20 h-2 bg-slate-100 rounded-full overflow-hidden ml-auto">
                                    <div className="h-full rounded-full bg-violet-500" style={{ width: `${(h.mer / maxMer) * 100}%` }} />
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot>
                          <tr className="border-t-2 border-slate-200 bg-slate-50 font-bold">
                            <td colSpan={5} className="px-4 py-3 text-slate-600 text-xs uppercase">Portfolio Weighted Avg MER</td>
                            <td className="px-4 py-3 text-right text-violet-700">{portfolioWtdMer != null ? fmtPct(portfolioWtdMer, 2) : "—"}</td>
                            <td className="px-4 py-3 text-right text-slate-700">{fmtAUD(annualMerCost)}</td>
                            <td />
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                </div>
              )}
            </div>

            <p className="text-xs text-slate-400 text-center pb-2">
              For internal use only. Market values and MERs should be updated to reflect current data.
              This tool does not constitute financial advice. © Bluerock Wealth.
            </p>
          </div>

          {(editTarget || showAdd) && (
            <EditModal
              holding={editTarget || {}}
              onSave={saveHolding}
              onClose={() => { setEditTarget(null); setShowAdd(false); }}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<PortfolioAnalyser />);
  </script>
</body>
</html>
